name: SonarCloud

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud_branch:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore Dependencies
        run: dotnet restore ./Streetcode/Streetcode.sln

      - name: SonarScanner Begin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin /k:"project-studying-dotnet_Streetcode-Server-January-2026" /o:"project-studying-dotnet" `
            /d:sonar.token="$env:SONAR_TOKEN" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.cs.opencover.reportsPaths="**/coverage-*.xml" `
            /d:sonar.exclusions="**/bin/**,**/obj/**,**/Migrations/**" `
            /d:sonar.coverage.exclusions="**/*Tests.cs,**/*Test.cs,**/*Seeding*.cs,**/Program.cs"

      - name: Build
        run: dotnet build ./Streetcode/Streetcode.sln --configuration Release --no-restore

      - name: Test Main API
        run: |
          dotnet test ./Streetcode/Streetcode.XUnitTest/Streetcode.XUnitTest.csproj `
            --configuration Release `
            --no-build `
            /p:CollectCoverage=true `
            /p:CoverletOutput=./coverage/coverage-main.xml `
            /p:CoverletOutputFormat=opencover

      - name: Test Auth API
        run: |
          dotnet test ./Streetcode/Streetcode.Auth.XUnitTest/Streetcode.Auth.XUnitTest.csproj `
            --configuration Release `
            --no-build `
            /p:CollectCoverage=true `
            /p:CoverletOutput=./coverage/coverage-auth.xml `
            /p:CoverletOutputFormat=opencover

      - name: SonarScanner End
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"

      - name: Publish Code Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Code Coverage Report
          path: "**/coverage-*.xml"
