version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: streetcode-rabbitmq
    restart: always
    ports:
      - "5672:5672" 
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  redis:
    image: redis:latest
    container_name: streetcode-redis
    restart: always
    ports:
      - "6379:6379"